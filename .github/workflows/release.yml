name: release

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write  # PyPI trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
      - name: Install
        # See ci.yml install-step comment for the mamba + homology rationale.
        # Release verification only needs interp + dev (lint/type/test/build).
        run: uv sync --extra interp --dev
      - name: Regenerate paper figures (must match committed sha256 manifest)
        run: uv run python scripts/make_paper_figures.py --out paper/figures
      - name: Run verify_release.py (six-item checklist)
        run: uv run python scripts/verify_release.py --tag "${GITHUB_REF_NAME}"
      - name: Build distributions
        run: uv build
      # Disabled until PyPI name is finalized (audit 2026-05-18: name squat detected)
      - name: Publish to PyPI (trusted)
        if: false
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: dist/*
