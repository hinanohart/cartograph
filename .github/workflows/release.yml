name: release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write  # PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        # See ci.yml install-step comment for the mamba + homology rationale.
        # Release verification only needs interp + dev (lint/type/test/build).
        run: uv sync --extra interp --dev
      - name: Regenerate paper figures (must match committed sha256 manifest)
        run: uv run python scripts/make_paper_figures.py --out paper/figures
      - name: Run verify_release.py (six-item checklist)
        run: uv run python scripts/verify_release.py --tag "${GITHUB_REF_NAME}"
      - name: Build distributions
        run: uv build
      # Trusted Publisher pending — flip on after PyPI config
      # To activate: configure the PyPI trusted publisher at https://docs.pypi.org/trusted-publishers/
      # for repo hinanohart/cartograph, workflow file "release.yml", environment unset.
      # Then remove the continue-on-error line below.
      - name: Publish to PyPI (trusted)
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true  # Trusted Publisher pending — flip on after PyPI config
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
