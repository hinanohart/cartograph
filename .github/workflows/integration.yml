name: integration

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Mon 06:00 UTC

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: Integration tests
        run: uv run pytest tests/integration -q
