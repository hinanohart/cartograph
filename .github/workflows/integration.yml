name: integration

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Mon 06:00 UTC

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        # See ci.yml install-step comment for the mamba + homology rationale.
        run: uv sync --extra interp --dev
      - name: Integration tests
        run: uv run pytest tests/integration -q
