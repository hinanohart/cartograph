name: reproduce

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce-paper-figures:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: Reproducibility tests (seed-fixed artefacts)
        run: uv run pytest tests/reproducibility -q -m reproducibility
      - name: Regenerate paper figures
        run: uv run python scripts/make_paper_figures.py --out paper/figures
      - name: Upload regenerated figures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paper-figures-${{ github.run_id }}
          path: paper/figures
