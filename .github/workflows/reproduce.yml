name: reproduce

on:
  workflow_dispatch:

jobs:
  reproduce-paper-figures:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev
      - name: Reproducibility tests (seed-fixed artefacts)
        run: uv run pytest tests/reproducibility -q -m reproducibility
      - name: Regenerate paper figures
        run: uv run python scripts/make_paper_figures.py --out paper/figures
      - name: Upload regenerated figures
        uses: actions/upload-artifact@v7
        with:
          name: paper-figures-${{ github.run_id }}
          path: paper/figures
