name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install
        # mamba extra is excluded: mamba-ssm requires a CUDA toolchain at
        # build time (declares torch as a runtime dep but not a build dep),
        # which the GitHub-hosted runner cannot satisfy. Phase 1a does not
        # exercise the mamba code path anyway (the adapter is a stub).
        run: uv sync --extra interp --extra homology --dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Format check
        run: uv run ruff format --check src tests
      - name: Type
        run: uv run mypy src
      - name: Unit tests
        run: uv run pytest tests/unit -q --cov=cartograph --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
