name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install
        # Phase 1a CI installs only the `interp` extra:
        # - `mamba` requires CUDA at build time (mamba-ssm doesn't declare
        #   torch in build-system.requires); CI runners are CPU-only.
        # - `homology` pulls giotto-tda 0.6 which has wheels only up to
        #   cp310 and pins scikit-learn < 1.5 (CVE source); no Phase 1a
        #   src/ code actually imports gtda or ripser.
        run: uv sync --extra interp --dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Format check
        run: uv run ruff format --check src tests
      - name: Type
        run: uv run mypy src
      - name: Unit tests
        run: uv run pytest tests/unit -q --cov=cartograph --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml
